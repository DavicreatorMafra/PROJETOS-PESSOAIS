<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamentos Salvos</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f1f5f9; color:#0f172a; margin:0; padding:0; }
  header { background:#0f172a; color:#fff; padding:18px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  header h1 { margin:0; font-size:20px; }
  .container { max-width:960px; margin:0 auto; padding:20px; }
  .toolbar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .btn { border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer; transition:.15s; background:#0284c7; color:#fff; }
  .btn:hover { filter:brightness(1.08); }
  .btn-secondary { background:#64748b; }
  .btn-success { background:#16a34a; }
  .btn-danger { background:#dc2626; }
  .btn-warning { background:#f59e0b; }
  .search { flex:1; min-width:200px; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; }
  .card { background:#fff; border-radius:10px; padding:16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.08); border-left:4px solid #0284c7; }
  .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .card-title { font-weight:700; font-size:16px; margin:0 0 4px; }
  .card-meta { font-size:13px; color:#475569; }
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .empty { text-align:center; padding:60px 20px; color:#64748b; }
  .empty h2 { color:#334155; }
  /* Modal */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; justify-content:center; align-items:flex-start; padding:20px; overflow-y:auto; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:12px; max-width:800px; width:100%; padding:24px; box-shadow:0 20px 40px rgba(0,0,0,.25); }
  .modal h2 { margin-top:0; }
  .modal-close { float:right; background:transparent; border:none; font-size:24px; cursor:pointer; color:#64748b; }
  .section { margin:18px 0; padding-top:12px; border-top:1px solid #e2e8f0; }
  .section h3 { font-size:14px; text-transform:uppercase; color:#64748b; letter-spacing:.5px; margin:0 0 8px; }
  .row { display:flex; justify-content:space-between; padding:4px 0; font-size:14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; margin-top:6px; }
  th, td { padding:6px 8px; text-align:left; border-bottom:1px solid #e2e8f0; }
  th { background:#f8fafc; }
  .totals { background:#f1f5f9; padding:12px; border-radius:8px; margin-top:8px; }
  .total-final { font-size:18px; font-weight:700; color:#0284c7; }
  .modal-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; padding-top:16px; border-top:2px solid #e2e8f0; }
  @media print {
    header, .toolbar, .card-actions, .modal-close, .modal-actions, .no-print { display:none !important; }
    .modal-bg { position:static; background:#fff; padding:0; }
    .modal { box-shadow:none; max-width:100%; }
  }
</style>
</head>
<body>
<header>
  <h1>📁 Orçamentos Salvos</h1>
  <a href="pag2.html" class="btn btn-secondary" style="text-decoration:none;">➕ Novo Orçamento</a>
</header>

<div class="container">
  <div class="toolbar no-print">
    <input type="text" id="search" class="search" placeholder="🔎 Buscar por cliente, empresa ou número..." oninput="renderList()">
  </div>
  <div id="list"></div>
</div>

<!-- Modal de visualização -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close no-print" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
    <div class="modal-actions no-print">
      <button class="btn btn-warning" onclick="editBudget()">✏️ Editar</button>
      <button class="btn btn-success" onclick="sendBudget()">✈️ Enviar</button>
      <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
      <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'local_budgets';
let currentDocId = null;

function getBudgets() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveBudgets(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
function findBudget(docId) { return getBudgets().find(b => b.clientData && b.clientData.docId === docId); }
function money(v) { return 'R$ ' + (Number(v)||0).toFixed(2).replace('.', ','); }

function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const list = getBudgets().slice().reverse();
  const filtered = q ? list.filter(b => {
    const c = b.clientData || {};
    return (c.name||'').toLowerCase().includes(q)
        || (c.company||'').toLowerCase().includes(q)
        || (c.docId||'').toLowerCase().includes(q);
  }) : list;

  const el = document.getElementById('list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">
      <h2>Nenhum orçamento encontrado</h2>
      <p>${list.length === 0 ? 'Crie seu primeiro orçamento clicando em "Novo Orçamento".' : 'Nenhum resultado para a busca.'}</p>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(b => {
    const c = b.clientData || {};
    const t = b.totals || {};
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <p class="card-title">${c.name || 'Sem nome'} ${c.company ? '— ' + c.company : ''}</p>
            <p class="card-meta">Nº <strong>${c.docId||'—'}</strong> · ${c.date||''} · ${money(t.final || t.total || 0)}</p>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn" onclick="openView('${c.docId}')">👁️ Visualizar</button>
          <button class="btn btn-danger" onclick="removeBudget('${c.docId}')">🗑️ Excluir</button>
        </div>
      </div>`;
  }).join('');
}

function removeBudget(docId) {
  if (!confirm(`Excluir o orçamento #${docId}?`)) return;
  saveBudgets(getBudgets().filter(b => b.clientData.docId !== docId));
  renderList();
}

function openView(docId) {
  const b = findBudget(docId);
  if (!b) return alert('Orçamento não encontrado.');
  currentDocId = docId;
  const c = b.clientData || {};
  const t = b.totals || {};
  const materials = b.materials || [];
  const labor = b.labor || [];
  const travel = b.travel || {};

  const matRows = materials.map(m => `<tr><td>${m.desc||''}</td><td>${m.qty||0}</td><td>${money(m.price)}</td><td>${money((m.qty||0)*(m.price||0))}</td></tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:#94a3b8;">Sem itens</td></tr>';
  const labRows = labor.map(l => `<tr><td>${l.desc||''}</td><td>${money(l.price)}</td></tr>`).join('') || '<tr><td colspan="2" style="text-align:center;color:#94a3b8;">Sem itens</td></tr>';

  document.getElementById('modal-content').innerHTML = `
    <h2>Orçamento #${c.docId||'—'}</h2>
    <p class="card-meta">${c.date||''} · Validade: ${c.validity||'—'}</p>

    <div class="section">
      <h3>Cliente</h3>
      <div class="row"><span>Nome</span><strong>${c.name||'—'}</strong></div>
      <div class="row"><span>Empresa</span><strong>${c.company||'—'}</strong></div>
      <div class="row"><span>CPF/CNPJ</span><strong>${c.document||'—'}</strong></div>
      <div class="row"><span>Endereço</span><strong>${[c.address, c.num, c.comp].filter(Boolean).join(', ')||'—'}</strong></div>
      <div class="row"><span>CEP</span><strong>${c.cep||'—'}</strong></div>
      <div class="row"><span>WhatsApp</span><strong>${c.whatsapp||'—'}</strong></div>
      <div class="row"><span>Telefone</span><strong>${c.phone||'—'}</strong></div>
    </div>

    <div class="section">
      <h3>Materiais</h3>
      <table><thead><tr><th>Descrição</th><th>Qtd</th><th>Unit.</th><th>Subtotal</th></tr></thead><tbody>${matRows}</tbody></table>
    </div>

    <div class="section">
      <h3>Mão de Obra</h3>
      <table><thead><tr><th>Descrição</th><th>Valor</th></tr></thead><tbody>${labRows}</tbody></table>
    </div>

    ${travel.active !== false && (travel.origin || travel.dest) ? `
    <div class="section">
      <h3>Deslocamento</h3>
      <div class="row"><span>Origem</span><strong>${travel.origin||'—'}</strong></div>
      <div class="row"><span>Destino</span><strong>${travel.dest||'—'}</strong></div>
      <div class="row"><span>KM</span><strong>${travel.km||0}</strong></div>
      <div class="row"><span>Taxa/KM</span><strong>${money(travel.rate)}</strong></div>
    </div>` : ''}

    ${t.obs ? `<div class="section"><h3>Observações</h3><p>${t.obs}</p></div>` : ''}

    <div class="section">
      <h3>Totais</h3>
      <div class="totals">
        <div class="row"><span>Subtotal</span><strong>${money(t.subtotal)}</strong></div>
        <div class="row"><span>Desconto</span><strong>${t.discount||0}%</strong></div>
        <div class="row total-final"><span>Total Final</span><strong>${money(t.final || t.total || 0)}</strong></div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentDocId = null;
}

function editBudget() {
  if (!currentDocId) return;
  window.location.href = `pag2.html?edit=${encodeURIComponent(currentDocId)}`;
}

async function sendBudget() {
  const b = findBudget(currentDocId);
  if (!b) return;
  const c = b.clientData || {};
  const t = b.totals || {};
  const text = `Orçamento #${c.docId}\nCliente: ${c.name}\nData: ${c.date}\nTotal: ${money(t.final||t.total||0)}\nValidade: ${c.validity||''}`;
  if (navigator.share) {
    try { await navigator.share({ title: `Orçamento #${c.docId}`, text }); return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  const wa = c.whatsapp ? c.whatsapp.replace(/\D/g,'') : '';
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(text)}`, '_blank');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

renderList();
</script>
</body>
</html>
